<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiny Wins V5 - Micro-Tasks for ADHD Minds</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            padding: 20px;
        }
        h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .tagline {
            font-size: 1.2em;
            opacity: 0.9;
        }
        .version-badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8em;
            margin-top: 10px;
        }
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .stat-box {
            background: rgba(255,255,255,0.95);
            padding: 20px 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            min-width: 120px;
        }
        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
        }
        .stat-label {
            color: #666;
            font-size: 0.9em;
            margin-top: 5px;
        }
        .streak-flame { color: #ff6b35; }
        .growth-section {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .growth-title {
            font-size: 1.2em;
            color: #667eea;
            margin-bottom: 15px;
        }
        .growth-visual {
            font-size: 4em;
            margin: 10px 0;
            transition: all 0.5s ease;
        }
        .growth-stage {
            font-weight: bold;
            color: #333;
            margin-top: 10px;
        }
        .growth-progress {
            width: 100%;
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            margin-top: 15px;
            overflow: hidden;
        }
        .growth-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 5px;
            transition: width 0.5s ease;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .btn-shuffle {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        .btn-done {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        .category-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }
        .category-card:hover { transform: translateY(-5px); }
        .category-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 3px solid #f0f0f0;
        }
        .category-icon { font-size: 2em; }
        .category-title {
            font-size: 1.4em;
            font-weight: bold;
            color: #333;
        }
        .task-list { list-style: none; }
        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            margin-bottom: 8px;
            background: #f8f9fa;
            border-radius: 10px;
            transition: all 0.3s ease;
        }
        .task-item:hover { background: #e9ecef; }
        .check-btn {
            width: 28px;
            height: 28px;
            border: 2px solid #667eea;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-size: 0.9em;
            color: transparent;
        }
        .check-btn:hover {
            background: #667eea;
            color: white;
        }
        .check-btn.checked {
            background: #28a745;
            border-color: #28a745;
            color: white;
        }
        .task-text { flex: 1; font-size: 0.95em; }
        .done-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-top: 30px;
        }
        .done-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .done-title {
            font-size: 1.8em;
            color: #28a745;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .done-list { list-style: none; }
        .done-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            margin-bottom: 10px;
            background: #d4edda;
            border-radius: 10px;
            animation: slideIn 0.5s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .celebration {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5em;
            pointer-events: none;
            animation: celebrate 1.5s ease forwards;
            z-index: 1000;
            text-shadow: 0 0 30px rgba(255,215,0,0.8);
        }
        @keyframes celebrate {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0) rotate(0deg); }
            25% { opacity: 1; transform: translate(-50%, -50%) scale(1.5) rotate(180deg); }
            50% { transform: translate(-50%, -50%) scale(1.2) rotate(360deg); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1) rotate(720deg); }
        }
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            pointer-events: none;
            animation: confetti-fall 3s ease-out forwards;
            z-index: 999;
        }
        @keyframes confetti-fall {
            0% { opacity: 1; transform: translateY(0) rotate(0deg); }
            100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
        }
        .encouragement {
            text-align: center;
            color: white;
            font-size: 1.1em;
            margin-top: 20px;
            font-style: italic;
            opacity: 0.9;
        }
        @media (max-width: 768px) {
            .categories-grid { grid-template-columns: 1fr; }
            h1 { font-size: 2em; }
            .stats-bar { gap: 15px; }
            .stat-box { padding: 15px 20px; min-width: 100px; }
            .growth-visual { font-size: 3em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>✨ Tiny Wins</h1>
            <p class="tagline">Micro-tasks for ADHD minds. Small steps, big momentum.</p>
            <span class="version-badge">V5 - 350 Tasks</span>
        </header>

        <div class="stats-bar">
            <div class="stat-box">
                <div class="stat-value" id="streak-count">0</div>
                <div class="stat-label"><span class="streak-flame">🔥</span> Day Streak</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="completed-count">0</div>
                <div class="stat-label">Completed Today</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="total-wins">0</div>
                <div class="stat-label">Total Wins</div>
            </div>
        </div>

        <div class="growth-section">
            <div class="growth-title">🌱 Your Growth Garden</div>
            <div class="growth-visual" id="growth-emoji">🌱</div>
            <div class="growth-stage" id="growth-stage">Tiny Seedling</div>
            <div class="growth-progress">
                <div class="growth-progress-bar" id="growth-bar" style="width: 0%"></div>
            </div>
            <p style="margin-top: 10px; color: #666; font-size: 0.9em;">
                <span id="tasks-to-next">10</span> more tasks to reach <span id="next-stage">Sprout</span>
            </p>
        </div>

        <div class="controls">
            <button class="btn btn-shuffle" onclick="shuffleTasks()">
                🎲 Shuffle Tasks
            </button>
            <button class="btn btn-done" onclick="showDoneList()">
                ✅ View Done List
            </button>
        </div>

        <div class="categories-grid" id="categories-container">
            <!-- Categories populated by JavaScript -->
        </div>

        <div class="done-section" id="done-section" style="display: none;">
            <div class="done-header">
                <h2 class="done-title">🎉 Done List</h2>
                <button class="btn" onclick="hideDoneList()" style="background: #6c757d; color: white;">Hide</button>
            </div>
            <ul class="done-list" id="done-list"></ul>
        </div>

        <p class="encouragement" id="encouragement">
            "Every tiny win is still a win. You've got this!"
        </p>
    </div>

    <script>
        // Task Database - 50 tasks per category (350 total)
        const taskDatabase = {
            home: {
                id: 'home', icon: '🏠', title: 'Home Environment', color: '#ff6b6b',
                tasks: ['Put one thing back where it belongs','Clear a surface (counter, table, desk)','Take out the trash','Do one dish or load/unload dishwasher','Make your bed (even just pulling up the covers)','Wipe one bathroom counter','Pick up clothes from floor','Water one plant','Open a window for fresh air','Put away 5 items','Sort mail into recycle/toss/file','Empty bathroom trash can','Wipe kitchen sink with sponge','Fold one towel','Straighten couch cushions','Dust one shelf','Clean one mirror','Sweep one room','Change one lightbulb','Organize one drawer','Wipe down microwave interior','Clean toilet bowl','Vacuum one high-traffic area','Wipe door handles and light switches','Take recycling out','Clean coffee maker','Wipe stovetop','Fluff pillows on couch','Hang up 3 pieces of clothing','Clean one window','Organize shoes by the door','Wipe baseboards in one room','Empty vacuum cleaner canister','Clean shower head','Wipe down fridge handles','Organize pantry shelf','Clean litter box or pet area','Shake out door mats','Wipe down trash can lid','Dust ceiling fan blades','Clean under couch cushions','Wipe down remote controls','Organize junk drawer','Clean bathroom mirror streaks','Sweep porch or entryway','Wipe down kitchen cabinets','Dust picture frames','Clean sink drain with baking soda','Organize medicine cabinet','Wipe down shower walls']
            },
            body: {
                id: 'body', icon: '💪', title: 'Body & Movement', color: '#4ecdc4',
                tasks: ['Stretch for 2 minutes','Take 10 deep breaths','Drink a glass of water','Do 5 jumping jacks','Walk around the room once','Roll your shoulders 5 times','Stand up and sit down 3 times','Touch your toes (or try!)','Do 3 push-ups (wall or floor)','Dance to one song','March in place for 1 minute','Do 10 arm circles forward','Do 10 arm circles backward','Neck rolls - 3 each direction','Wrist stretches - 10 seconds each','Ankle circles - 5 each foot','Calf raises - 10 reps','Wall sit for 20 seconds','Plank for 15 seconds','Side stretch - hold 15 seconds each','Hip circles - 5 each direction','Quad stretch - hold 20 seconds each leg','Hamstring stretch - hold 20 seconds','Chest opener stretch','Child pose for 30 seconds','Cat-cow stretch - 5 rounds','Seated spinal twist - 15 seconds each side','Butterfly stretch for 30 seconds','Walk up and down stairs once','Do 5 squats','Do 5 lunges (each leg)','High knees for 30 seconds','Butt kicks for 30 seconds','Arm raises overhead - 10 reps','Side lunges - 3 each direction','Tricep dips using chair - 5 reps','Step-ups on stairs - 5 each leg','Shadow box for 1 minute','Jump rope (real or imaginary) for 1 minute','Walk heel-to-toe in a line','Balance on one foot - 15 seconds each','Toe touches while seated','Shoulder blade squeeze - hold 10 seconds','Chin tucks - 5 reps','Pelvic tilts - 10 reps','Glute squeezes - hold 10 seconds, 5 reps','Abdominal bracing - hold 10 seconds','Finger spreads - open/close 10 times','Thumb touches - each fingertip, both hands','Self-massage neck and shoulders']
            },
            mind: {
                id: 'mind', icon: '🧠', title: 'Mind & Focus', color: '#95e1d3',
                tasks: ['Set a timer for 5 minutes of focus','Write down 3 things on your mind','Close eyes and breathe for 1 minute','Make a list of 2 priorities','Read one page of a book','Delete 3 old emails','Set one intention for today','Do a brain dump for 2 minutes','Practice gratitude: name 1 thing','Step away from screen for 2 minutes','Count backwards from 100 by 7s','Name 5 things you can see right now','Name 4 things you can touch','Name 3 things you can hear','Name 2 things you can smell','Name 1 thing you can taste','Box breathing: 4 counts in, hold, out, hold','4-7-8 breathing technique','Alternate nostril breathing','Body scan meditation - 3 minutes','Loving-kindness meditation - 2 minutes','Visualization: peaceful place - 2 minutes','Mindful eating of one snack','Mindful hand washing','Mindful tooth brushing','Single-task for 10 minutes','Pomodoro: 25 min focus, 5 min break','Write morning pages - 3 pages','Journal about one emotion','Write a letter to your future self','List 10 things you are good at','Identify one limiting belief','Reframe one negative thought','Practice saying no out loud','Set a boundary with yourself','Identify your energy level (1-10)','Notice without judgment for 2 minutes','Label emotions: name what you feel','Practice self-compassion phrase','Forgive yourself for one thing','Celebrate one recent win','Identify one strength you used today','Write an already done list','Create a not to do list','Define success for today','Identify your peak energy hours','Plan tomorrow top 3 priorities']
            },
            social: {
                id: 'social', icon: '💬', title: 'Social Connection', color: '#f38181',
                tasks: ['Send one text to a friend','Give someone a compliment','Say I love you to someone','Wave at a neighbor','Call someone for 2 minutes','Send a funny meme','Thank someone for something small','Smile at yourself in mirror','Ask someone how their day is','Send a voice note instead of text','React to 3 friends social media posts','Share a memory with someone','Ask for advice from someone you trust','Offer to help someone with a small task','Tell someone what you appreciate about them','Send a thinking of you message','Introduce yourself to someone new','Remember to use someone name in conversation','Ask someone about their weekend plans','Share a book or show recommendation','Send a photo that reminds you of someone','Wish someone happy birthday (if applicable)','Check in on someone who has been quiet','Tell a family member you appreciate them','Leave a positive review for a business','Send a thank you note (digital or paper)','Ask someone about their hobby or interest','Share a joke or funny story','Listen to someone without interrupting','Validate someone feelings','Apologize for something small you did','Forgive someone in your heart','Set a boundary kindly but firmly','Ask for what you need directly','Say no to something you do not want to do','Accept a compliment gracefully','Give yourself credit out loud','Tell someone you are proud of them','Celebrate someone else win','Send an encouraging message to someone struggling','Reconnect with an old friend','Make plans with someone for this week','Cancel plans you are dreading (gently)','Join a group or community event','Leave a nice comment on a creator post']
            },
            creative: {
                id: 'creative', icon: '🎨', title: 'Creative Expression', color: '#aa96da',
                tasks: ['Doodle for 2 minutes','Write one sentence','Take a photo of something beautiful','Hum or sing a song','Rearrange one thing decoratively','Write down one idea','Color for 3 minutes','Make a playlist of 3 songs','Look at art online for 2 minutes','Try a new recipe or food combo','Write a 6-word story','Draw your current mood','Make a collage from magazine cutouts','Write a poem (even a bad one)','Take 5 photos from different angles','Create a mood board','Design your dream room on paper','Write a letter you will not send','Make up a character and describe them','Sketch your coffee mug','Write a fake product review','Create a new word and define it','Draw with your non-dominant hand','Make a zine from one sheet of paper','Write a haiku about your day','Design a logo for an imaginary business','Create a color palette you love','Write a short dialogue between two people','Make a paper airplane','Origami - fold one simple shape','Finger paint (or use markers)','Create a vision board snippet','Write a bucket list item','Design a tattoo you would never get','Make a comic strip (3 panels)','Write a song parody','Create a new recipe combination','Decorate your planner or journal','Make a bookmark','Create a greeting card','Write a fake horoscope','Design a t-shirt graphic','Make a paper chain','Create a word cloud of your day','Write a mini movie review','Design your perfect workspace']
            },
            admin: {
                id: 'admin', icon: '📋', title: 'Admin & Life Stuff', color: '#f7b731',
                tasks: ['Pay one bill','File one paper','Make one appointment','Respond to one message','Check bank balance','Add one item to calendar','Unsubscribe from one email list','Set one reminder','Order one needed item online','Back up phone photos','Set up autopay for one bill','Update one password','Clear your downloads folder','Empty trash/recycle bin on computer','Organize desktop icons','Update software on one device','Clean out voicemail','Update your resume or LinkedIn','Schedule a doctor/dentist appointment','Check expiration dates on medications','Renew your driver license (if needed)','Update emergency contacts','Review and update insurance info','Check credit report (free annual)','Cancel one unused subscription','Return one item you have been meaning to','Organize receipts for taxes','Set a financial goal for the month','Check and update budget categories','Transfer money to savings','Review recurring charges','Update your address with one service','Register to vote or check registration','Research one financial question','Create a password for a new account','Enable two-factor authentication','Review privacy settings on one app','Delete old accounts you do not use','Organize bookmarks in browser','Clear browser cache and cookies','Update your phone contact list','Set up a filing system for papers','Shred old documents you do not need','Organize cords and cables','Label one container or shelf','Create a meal plan for tomorrow','Make a grocery list']
            },
            selfcare: {
                id: 'selfcare', icon: '🌸', title: 'Self-Care & Comfort', color: '#ff9ff3',
                tasks: ['Apply lotion to hands','Brush teeth (if not done)','Put on comfortable clothes','Light a candle or use nice scent','Look in mirror and say something kind','Take a shower (even quick)','Put on music you love','Make a cozy drink','Sit in sunlight for 2 minutes','Give yourself permission to rest','Take a warm bath with Epsom salts','Do a foot soak','Give yourself a hand massage','Apply lip balm','Trim your nails','Clean your glasses or sunglasses','Change your pillowcase','Make your sleeping area cozy','Use aromatherapy (candle, oil, spray)','Listen to calming music','Do a body scan for tension','Apply heat or ice to sore areas','Do a gentle face massage','Dry brush your skin','Put on clean, soft pajamas','Make your favorite comfort food','Eat something nourishing','Hydrate with herbal tea','Take a power nap (20 min)','Go to bed 30 minutes earlier','Sleep in an extra 15 minutes','Open curtains for natural light','Sit outside for fresh air','Watch a comfort show episode','Read a chapter of a favorite book','Listen to an audiobook','Do a puzzle or crossword','Play a calming game','Cuddle with a pet or stuffed animal','Wrap yourself in a blanket burrito','Use a weighted blanket','Put on noise-canceling headphones','Create a cozy reading nook','Light a scented candle','Watch the sunset or sunrise','Stargaze for 5 minutes','Sit by a window and people-watch']
            }
        };

        // Growth stages
        const growthStages = [
            { emoji: '🌱', name: 'Tiny Seedling', min: 0, max: 9 },
            { emoji: '🌿', name: 'Little Sprout', min: 10, max: 24 },
            { emoji: '🪴', name: 'Growing Plant', min: 25, max: 49 },
            { emoji: '🌳', name: 'Strong Sapling', min: 50, max: 99 },
            { emoji: '🌲', name: 'Mighty Tree', min: 100, max: 199 },
            { emoji: '🌳✨', name: 'Ancient Oak', min: 200, max: 349 },
            { emoji: '🌳👑', name: 'Legendary Grove', min: 350, max: Infinity }
        ];

        // Encouraging messages
        const encouragements = [
            "Every tiny win is still a win. You've got this!",
            "Progress, not perfection. Keep going!",
            "Small steps lead to big changes.",
            "You're doing better than you think.",
            "One thing at a time. You're crushing it!",
            "Your future self will thank you.",
            "Momentum builds momentum. Keep it up!",
            "You are enough, exactly as you are.",
            "Tiny wins count. They all add up!",
            "Be gentle with yourself. You're doing great."
        ];

        // State
        let completedTasks = JSON.parse(localStorage.getItem('tinyWinsV5_completed') || '[]');
        let totalWins = parseInt(localStorage.getItem('tinyWinsV5_total') || '0');
        let currentStreak = parseInt(localStorage.getItem('tinyWinsV5_streak') || '0');
        let lastCompletedDate = localStorage.getItem('tinyWinsV5_lastDate');
        let currentDisplayedTasks = {};

        // Initialize
        function init() {
            checkStreak();
            shuffleTasks();
            updateStats();
            updateGrowth();
            renderDoneList();
        }

        // Check and update streak
        function checkStreak() {
            const today = new Date().toDateString();
            const yesterday = new Date(Date.now() - 86400000).toDateString();
            if (lastCompletedDate === today) {
                // Already completed today
            } else if (lastCompletedDate === yesterday) {
                // Completed yesterday, streak continues
            } else if (lastCompletedDate && lastCompletedDate !== today) {
                currentStreak = 0;
                localStorage.setItem('tinyWinsV5_streak', currentStreak);
            }
        }

        // Update growth visual
        function updateGrowth() {
            const stage = growthStages.find(s => totalWins >= s.min && totalWins <= s.max) || growthStages[0];
            document.getElementById('growth-emoji').textContent = stage.emoji;
            document.getElementById('growth-stage').textContent = stage.name;
            
            const nextStage = growthStages[growthStages.indexOf(stage) + 1];
            if (nextStage) {
                const progress = Math.min(100, ((totalWins - stage.min) / (nextStage.min - stage.min)) * 100);
                document.getElementById('growth-bar').style.width = progress + '%';
                document.getElementById('tasks-to-next').textContent = nextStage.min - totalWins;
                document.getElementById('next-stage').textContent = nextStage.name;
            } else {
                document.getElementById('growth-bar').style.width = '100%';
                document.getElementById('tasks-to-next').textContent = '0';
                document.getElementById('next-stage').textContent = 'Max Level!';
            }
        }

        // Shuffle and render tasks
        function shuffleTasks() {
            const container = document.getElementById('categories-container');
            container.innerHTML = '';
            currentDisplayedTasks = {};
            
            Object.values(taskDatabase).forEach(cat => {
                const shuffled = [...cat.tasks].sort(() => 0.5 - Math.random());
                const selected = shuffled.slice(0, 10);
                currentDisplayedTasks[cat.id] = selected;
                
                const catDiv = document.createElement('div');
                catDiv.className = 'category-card';
                catDiv.innerHTML = `
                    <div class="category-header">
                        <span class="category-icon">${cat.icon}</span>
                        <span class="category-title">${cat.title}</span>
                    </div>
                    <ul class="task-list">
                        ${selected.map((task, index) => `
                            <li class="task-item">
                                <button class="check-btn" onclick="completeTask('${cat.id}', ${index}, '${task.replace(/'/g, "\\'")}')">✓</button>
                                <span class="task-text">${task}</span>
                            </li>
                        `).join('')}
                    </ul>
                `;
                container.appendChild(catDiv);
            });
        }

        // Complete a task
        function completeTask(categoryId, taskIndex, taskText) {
            const today = new Date().toDateString();
            const timestamp = new Date().toLocaleString();
            
            // Add to completed
            completedTasks.unshift({
                text: taskText,
                category: categoryId,
                timestamp: timestamp
            });
            
            // Update stats
            totalWins++;
            if (lastCompletedDate !== today) {
                currentStreak++;
                lastCompletedDate = today;
            }
            
            // Save to localStorage
            localStorage.setItem('tinyWinsV5_completed', JSON.stringify(completedTasks));
            localStorage.setItem('tinyWinsV5_total', totalWins);
            localStorage.setItem('tinyWinsV5_streak', currentStreak);
            localStorage.setItem('tinyWinsV5_lastDate', lastCompletedDate);
            
            // Update UI
            updateStats();
            updateGrowth();
            renderDoneList();
            
            // Visual celebration
            createConfetti();
            showCelebration();
            
            // Update encouragement
            document.getElementById('encouragement').textContent = encouragements[Math.floor(Math.random() * encouragements.length)];
        }

        // Update stats display
        function updateStats() {
            const today = new Date().toDateString();
            const todayCompleted = completedTasks.filter(t => t.timestamp && t.timestamp.includes(today.slice(4, 10))).length;
            document.getElementById('streak-count').textContent = currentStreak;
            document.getElementById('completed-count').textContent = todayCompleted;
            document.getElementById('total-wins').textContent = totalWins;
        }

        // Render done list
        function renderDoneList() {
            const doneList = document.getElementById('done-list');
            if (completedTasks.length === 0) {
                doneList.innerHTML = '<li style="text-align: center; color: #666; padding: 20px;">No tasks completed yet. You have got this!</li>';
                return;
            }
            
            doneList.innerHTML = completedTasks.slice(0, 20).map(task => `
                <li class="done-item">
                    <span>✅</span>
                    <span>${task.text} <small style="color: #666;">(${task.timestamp})</small></span>
                </li>
            `).join('');
        }

        // Show/hide done list
        function showDoneList() {
            document.getElementById('done-section').style.display = 'block';
            document.getElementById('done-section').scrollIntoView({ behavior: 'smooth' });
        }

        function hideDoneList() {
            document.getElementById('done-section').style.display = 'none';
        }

        // Celebration effects
        function showCelebration() {
            const celebration = document.createElement('div');
            celebration.className = 'celebration';
            celebration.textContent = ['🎉','✨','🌟','💫','🎊','🏆'][Math.floor(Math.random() * 6)];
            document.body.appendChild(celebration);
            setTimeout(() => celebration.remove(), 1500);
        }

        // Create confetti
        function createConfetti() {
            const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#f9ca24', '#f0932b', '#eb4d4b', '#6c5ce7', '#fd79a8'];
            for (let i = 0; i < 30; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = Math.random() * 0.5 + 's';
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 3000);
            }
        }

        // Initialize on load
        init();
    </script>
</body>
</html>
