<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiny Wins v7.1 | Daily Garden</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #2d3748;
        }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { color: white; text-align: center; margin-bottom: 8px; font-size: 2.2rem; }
        .subtitle { color: rgba(255,255,255,0.8); text-align: center; margin-bottom: 20px; }
        .stats-bar {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .stat {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 12px;
            text-align: center;
            color: white;
            min-width: 100px;
        }
        .stat-value { font-size: 1.5rem; font-weight: bold; }
        .stat-label { font-size: 0.75rem; opacity: 0.9; }
        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .garden-container {
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 40%, #90EE90 40%, #228B22 100%);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            min-height: 400px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .garden-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .garden-title { color: #2d3748; font-size: 1.2rem; font-weight: 600; }
        .date-display {
            background: rgba(255,255,255,0.9);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .garden-plot {
            position: relative;
            min-height: 320px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            margin-top: 10px;
        }
        .plant {
            position: absolute;
            cursor: grab;
            user-select: none;
            transition: transform 0.2s;
            z-index: 10;
        }
        .plant:hover { transform: scale(1.1); }
        .stage-seed { font-size: 1.5rem; }
        .stage-sprout { font-size: 2.2rem; }
        .stage-growing { font-size: 3rem; }
        .stage-bloom { font-size: 4rem; }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102,126,234,0.4);
        }
        .btn-check {
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
            padding: 8px 16px;
            font-size: 0.85rem;
        }
        .category-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .tab {
            padding: 10px 16px;
            border-radius: 20px;
            background: rgba(102,126,234,0.1);
            color: #667eea;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
            border: none;
        }
        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .task-list { display: grid; gap: 10px; }
        .task-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: rgba(102,126,234,0.05);
            border-radius: 10px;
            transition: all 0.2s;
        }
        .task-item:hover { background: rgba(102,126,234,0.1); }
        .plant-selector {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .plant-option {
            background: rgba(102,126,234,0.1);
            border-radius: 12px;
            padding: 15px 25px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .plant-option:hover { background: rgba(102,126,234,0.2); transform: scale(1.05); }
        .plant-option .emoji { font-size: 2.5rem; }
        .plant-option .name { font-size: 0.8rem; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌱 Tiny Wins Daily Garden</h1>
        <p class="subtitle">v7.1 — Grow your garden one task at a time</p>
        
        <div class="stats-bar">
            <div class="stat">
                <div class="stat-value" id="sunbeam-count">0</div>
                <div class="stat-label">☀️ Sunbeams</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="streak-count">0</div>
                <div class="stat-label">🔥 Streak</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="today-count">0</div>
                <div class="stat-label">✅ Today</div>
            </div>
        </div>

        <div class="garden-container">
            <div class="garden-header">
                <span class="garden-title">🌿 Today's Garden</span>
                <span class="date-display" id="current-date"></span>
            </div>
            <div class="garden-plot" id="garden-plot"></div>
        </div>

        <div class="card">
            <h3 style="text-align: center; margin-bottom: 15px; color: #764ba2;">Choose a Plant to Add</h3>
            <div class="plant-selector" id="plant-selector"></div>
        </div>

        <div class="card">
            <h2 style="color: #764ba2; margin-bottom: 16px; text-align: center;">Complete Tasks to Grow Your Garden</h2>
            <div class="category-tabs" id="category-tabs"></div>
            <div class="task-list" id="task-list"></div>
        </div>
    </div>

    <script>
        // Game Data
        const plantTypes = [
            { id: 'sunflower', emoji: '🌻', name: 'Sunflower' },
            { id: 'rose', emoji: '🌹', name: 'Rose' },
            { id: 'tulip', emoji: '🌷', name: 'Tulip' }
        ];

        const categories = [
            { id: 'home', name: '🏠 Home' },
            { id: 'body', name: '💪 Body' },
            { id: 'mind', name: '🧠 Mind' },
            { id: 'people', name: '👥 People' },
            { id: 'money', name: '💰 Money' },
            { id: 'fun', name: '🎉 Fun' },
            { id: 'growth', name: '🌱 Growth' }
        ];

        const taskDatabase = {
            home: ['Make bed', 'Wash dishes', 'Wipe counter', 'Sweep floor', 'Take out trash'],
            body: ['Drink water', 'Stretch 5 min', 'Take vitamins', 'Walk 10 min', 'Healthy snack'],
            mind: ['Meditate 5 min', 'Read 10 pages', 'Journal', 'No phone 30 min', 'Practice gratitude'],
            people: ['Text a friend', 'Call family', 'Compliment someone', 'Help a neighbor', 'Say thank you'],
            money: ['Check balance', 'No spend day', 'Pack lunch', 'Cancel subscription', 'Sell unused item'],
            fun: ['Listen to music', 'Watch funny video', 'Dance break', 'Play game', 'Draw/color'],
            growth: ['Set goal', 'Track habit', 'Reflect on day', 'Celebrate win', 'Try new thing']
        };

        // State
        let state = {
            sunbeams: 0,
            streak: 0,
            todayCount: 0,
            lastDate: null,
            currentCategory: 'home',
            todaysPlants: []
        };

        // Initialize
        function init() {
            loadState();
            checkDailyReset();
            renderDate();
            renderStats();
            renderGarden();
            renderPlantSelector();
            renderCategories();
            renderTasks();
        }

        // Load/Save State
        function loadState() {
            const saved = localStorage.getItem('tinyWinsV7');
            if (saved) {
                state = { ...state, ...JSON.parse(saved) };
            }
        }

        function saveState() {
            localStorage.setItem('tinyWinsV7', JSON.stringify(state));
        }

        // Daily Reset
        function checkDailyReset() {
            const today = new Date().toDateString();
            if (state.lastDate && state.lastDate !== today) {
                // Save to history and reset
                state.todaysPlants = [];
                state.todayCount = 0;
                
                // Check streak
                const lastDate = new Date(state.lastDate);
                const diffDays = Math.floor((new Date() - lastDate) / (1000 * 60 * 60 * 24));
                if (diffDays > 1) {
                    state.streak = 0;
                }
            }
            state.lastDate = today;
            saveState();
        }

        // Render Functions
        function renderDate() {
            document.getElementById('current-date').textContent = new Date().toLocaleDateString('en-US', { 
                weekday: 'short', month: 'short', day: 'numeric' 
            });
        }

        function renderStats() {
            document.getElementById('sunbeam-count').textContent = state.sunbeams;
            document.getElementById('streak-count').textContent = state.streak;
            document.getElementById('today-count').textContent = state.todayCount;
        }

        function renderGarden() {
            const plot = document.getElementById('garden-plot');
            plot.innerHTML = '';
            
            state.todaysPlants.forEach((plant) => {
                const el = document.createElement('div');
                el.className = `plant stage-${plant.stage}`;
                el.textContent = plant.emoji;
                el.style.left = plant.x + 'px';
                el.style.top = plant.y + 'px';
                plot.appendChild(el);
            });
        }

        function renderPlantSelector() {
            const container = document.getElementById('plant-selector');
            container.innerHTML = plantTypes.map(plant => `
                <div class="plant-option" onclick="addPlant('${plant.id}')">
                    <div class="emoji">${plant.emoji}</div>
                    <div class="name">${plant.name}</div>
                </div>
            `).join('');
        }

        function renderCategories() {
            const container = document.getElementById('category-tabs');
            container.innerHTML = categories.map(cat => `
                <button class="tab ${state.currentCategory === cat.id ? 'active' : ''}" 
                        onclick="setCategory('${cat.id}')">
                    ${cat.name}
                </button>
            `).join('');
        }

        function renderTasks() {
            const container = document.getElementById('task-list');
            const tasks = taskDatabase[state.currentCategory] || [];
            container.innerHTML = tasks.map((task, i) => `
                <div class="task-item">
                    <span style="flex: 1;">${task}</span>
                    <button class="btn btn-check" onclick="completeTask('${task}')">✓</button>
                </div>
            `).join('');
        }

        // Actions
        function setCategory(id) {
            state.currentCategory = id;
            renderCategories();
            renderTasks();
        }

        function addPlant(plantId) {
            const plant = plantTypes.find(p => p.id === plantId);
            if (!plant) return;
            
            const plot = document.getElementById('garden-plot');
            const x = 20 + Math.random() * (plot.offsetWidth - 100);
            const y = 100 + Math.random() * (plot.offsetHeight - 150);
            
            state.todaysPlants.push({
                id: plantId,
                emoji: plant.emoji,
                stage: 'seed',
                x: x,
                y: y
            });
            
            saveState();
            renderGarden();
        }

        function completeTask(taskName) {
            // Update stats
            state.todayCount++;
            state.sunbeams += 10;
            
            // First task bonus
            if (state.todayCount === 1) {
                state.sunbeams += 5;
            }
            
            // Streak bonus every 7 tasks
            if (state.todayCount % 7 === 0) {
                state.streak++;
                state.sunbeams += 50;
            }
            
            saveState();
            renderStats();
            renderTasks();
            
            // Grow plants
            state.todaysPlants.forEach(plant => {
                if (plant.stage === 'seed') plant.stage = 'sprout';
                else if (plant.stage === 'sprout') plant.stage = 'growing';
                else if (plant.stage === 'growing') plant.stage = 'bloom';
            });
            renderGarden();
        }

        // Start
        init();
    </script>
</body>
</html>
